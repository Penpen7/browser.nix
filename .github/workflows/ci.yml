name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# 同一ブランチ/PR で新しい push があれば古い実行をキャンセル
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Build
        run: nix build .#brave .#google-chrome --print-build-logs

  verify-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Build and verify signatures
        run: |
          nix build .#brave .#google-chrome --print-build-logs
          codesign --verify --deep --strict "result/Applications/Brave Browser.app"
          codesign --verify --deep --strict "result-1/Applications/Google Chrome.app"
